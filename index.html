<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#6366f1">
  <meta name="description" content="Aplicación web progresiva">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="MiApp">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/icon.svg">
  <link rel="apple-touch-icon" href="/icon-192.svg">
  <title>Mi App PWA</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <h1>Mi Aplicación PWA</h1>
    <p>Instálala para usarla sin conexión</p>
  </header>

  <main>
    <section id="status">
      <p id="connection-status">Conectado</p>
    </section>
  </main>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js").then((reg) => {
          console.log("SW registrado:", reg.scope);
        }).catch((err) => {
          console.error("Error al registrar SW:", err);
        });
      });
    }
  </script>
  <script src="/app.js"></script>
</body>
</html>
